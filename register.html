
<!DOCTYPE html>
<html>
<head>
<title>Student Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">
<h2 class="mt-4">Student Registration</h2>

<form method="post">
<input class="form-control mb-2" name="name" placeholder="Name">
<input class="form-control mb-2" name="email" placeholder="Email">
<input class="form-control mb-2" name="branch" placeholder="Branch">
<input class="form-control mb-2" name="cgpa" placeholder="CGPA">

<button class="btn btn-primary">Register</button>
</form>

</body>
</html>
