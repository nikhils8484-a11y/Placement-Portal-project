
<!DOCTYPE html>
<html>
<head>
<title>Post Job</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">

<h2 class="mt-4">Company Job Posting</h2>

<form method="post">
<input class="form-control mb-2" name="company" placeholder="Company Name">
<input class="form-control mb-2" name="role" placeholder="Job Role">
<input class="form-control mb-2" name="package" placeholder="Package">

<button class="btn btn-success">Post Job</button>
</form>

</body>
</html>
